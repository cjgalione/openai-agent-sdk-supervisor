name: Daily modal queries
on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      num_questions:
        description: "Number of questions to generate for this manual run"
        required: false
        default: "5"

jobs:
  run-queries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version-file: ".python-version"

      - name: Install dependencies with uv
        run: uv pip install -r requirements.txt --system

      - name: Debug Braintrust key fingerprint (temporary)
        env:
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
        run: |
          python - <<'PY'
          import hashlib
          import os

          key = os.getenv("BRAINTRUST_API_KEY", "")
          print("BT_KEY_LEN", len(key))
          print("BT_KEY_PREFIX", key[:4] if key else "")
          print("BT_KEY_SUFFIX", key[-4:] if len(key) >= 4 else key)
          print("BT_KEY_SHA256", hashlib.sha256(key.encode()).hexdigest() if key else "")
          print("BT_KEY_HAS_NEWLINE", "\n" in key)
          print("BT_KEY_HAS_QUOTES", ("'" in key) or ('"' in key))
          PY

      - name: Run queries
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          BRAINTRUST_PROJECT: openai-agent-sdk-supervisor
          BRAINTRUST_ORG_NAME: Braintrust Demos
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          NUM_QUESTIONS: ${{ github.event.inputs.num_questions || '25' }}
        run: |
          uv run python scripts/run_queries.py --num-questions "$NUM_QUESTIONS"
